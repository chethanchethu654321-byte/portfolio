<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(121, 121, 226);
        }
        h2{
            text-align: center;
            background-color: blue;
        }
        form{
            text-align: center;
            border: 2px solid black;
            margin-left: 500px;
            margin-right: 500px;
            padding: 20px;
            background-color: darkgray;
            border-radius: 150px;
            text-shadow: 0 0 20px white;
        
        }

    </style>
</head>
<body>
    <div class="contact-container">
    <h2>Contact Us</h2>
    <form action="#" method="post">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="enter name" required><br><br>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your email" required><br><br>

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Write your message..." required></textarea><br><br>

        <button type="submit">Send Message</button>
    </form>
</div><br>
<footer><marquee behavior="" direction="">Thank you for your responce</marquee></footer>
</body>
</html>
